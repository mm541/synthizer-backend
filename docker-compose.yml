version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: synthizer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: synthizer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - synthizer_postgres_data:/var/lib/postgresql/data

volumes:
  synthizer_postgres_data:
